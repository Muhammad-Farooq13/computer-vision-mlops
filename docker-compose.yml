version: '3.8'

services:
  cv-model:
    build: .
    container_name: cv-model-app
    ports:
      - "5000:5000"
    volumes:
      - ./models/saved_models:/app/models/saved_models
      - ./data:/app/data
      - ./logs:/app/logs
      - ./api/static/uploads:/app/api/static/uploads
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
