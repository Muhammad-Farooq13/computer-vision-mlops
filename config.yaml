# Configuration file for the Computer Vision project

# Data Configuration
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  image_size: [224, 224]
  batch_size: 32
  num_workers: 4
  shuffle: true

# Model Configuration
model:
  architecture: "resnet50"  # Options: resnet18, resnet50, efficientnet_b0, vgg16
  pretrained: true
  num_classes: 10
  dropout: 0.5
  freeze_backbone: false

# Training Configuration
training:
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: "adam"  # Options: adam, sgd, adamw
  scheduler: "reduce_on_plateau"  # Options: reduce_on_plateau, step, cosine
  early_stopping_patience: 10
  save_best_only: true
  mixed_precision: false

# Augmentation Configuration
augmentation:
  train:
    horizontal_flip: 0.5
    vertical_flip: 0.2
    rotation: 15
    brightness_contrast: 0.3
    shift_scale_rotate: 0.5
  validation:
    normalize_only: true

# Paths Configuration
paths:
  model_save_dir: "models/saved_models"
  log_dir: "logs"
  results_dir: "results"
  checkpoint_dir: "models/checkpoints"

# Deployment Configuration
deployment:
  host: "0.0.0.0"
  port: 5000
  debug: false
  max_content_length: 16777216  # 16MB
  allowed_extensions: ["png", "jpg", "jpeg", "bmp"]

# MLflow Configuration
mlflow:
  tracking_uri: "mlruns"
  experiment_name: "cv_model_experiment"
  artifact_location: "mlruns/artifacts"

# Logging Configuration
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_max_bytes: 10485760  # 10MB
  backup_count: 5

# Monitoring Configuration
monitoring:
  enabled: true
  metrics_interval: 300  # seconds
  alert_threshold: 0.1  # 10% accuracy drop

# Random Seed
seed: 42
